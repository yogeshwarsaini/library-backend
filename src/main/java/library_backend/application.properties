spring.application.name=library-backend
server.port=5000

# RDS se environment variables lega - Beanstalk inject karega
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/librarydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.library_backend=INFO
